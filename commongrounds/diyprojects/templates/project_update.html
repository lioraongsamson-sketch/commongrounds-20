{% extends 'base.html' %}

{% load static %}

{% block content %}
    <h1 class="app_head">DIY Projects</h1>
    <h2 class="app_head">Edit Project</h2>

    <div class="form">
    <form method="post">
        {% csrf_token %}

        <p>
            <label>Title:</label><br>
            {{ form.title }}
        </p>

        <p>
            <label>Creator:</label><br>
            {{ form.creator }}
        </p>

        <p>
            <label>Category:</label><br>
            {{ form.category }}
        </p>

        <p>
            <label>Status:</label><br>
            {{ form.status }}
        </p>

        <p>
            <label>Description:</label><br>
            {{ form.description }}
        </p>

        <p>
            <label>Materials:</label><br>
            {{ form.materials }}
        </p>

        <p>
            <label>Steps:</label><br>
            {{ form.steps }}
        </p>

        <button type="submit">Update Project</button>
        <button type="button">
            <a href="{% url 'diyprojects:project_detail' object.pk %}"> Cancel </a>
        </button>
    </form>
    </div>
{% endblock %}
